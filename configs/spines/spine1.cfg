hostname Spine-1

ip routing

interface Ethernet1
   description TO_Leaf-1
   no switchport
   ip address 10.0.0.0/31

interface Ethernet2
   description TO_Leaf-2
   no switchport
   ip address 10.0.0.2/31

router bgp 65000
   router-id 1.1.1.1
   neighbor 10.0.0.1 remote-as 65001
   neighbor 10.0.0.1 description Leaf-1
   neighbor 10.0.0.3 remote-as 65002
   neighbor 10.0.0.3 description Leaf-2
