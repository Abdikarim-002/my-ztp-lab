hostname Spine-2

ip routing

interface Ethernet1
   description TO_Leaf-1
   no switchport
   ip address 10.0.0.4/31

interface Ethernet2
   description TO_Leaf-2
   no switchport
   ip address 10.0.0.6/31

router bgp 65000
   router-id 2.2.2.2
   neighbor 10.0.0.5 remote-as 65001
   neighbor 10.0.0.5 description Leaf-1
   neighbor 10.0.0.7 remote-as 65002
   neighbor 10.0.0.7 description Leaf-2
